<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nic Cage Snacks Shop — Firebase web shop by Elli &amp; Dany"
    />
    <title>Nic Cage Snacks Shop</title>
  </head>
  <body>
    <header class="hero">
      <img id="ng" src="/images/ng.gif" alt="Nic Cage" width="280" height="280" />
      <div>
        <p class="eyebrow">Firebase snack shop</p>
        <h1 id="welcome">Nic Cage favorite snacks</h1>
        <p class="subtitle">Elli &amp; Dany — handla snacks med Firebase-lager</p>
      </div>
    </header>

    <p id="errorMessage" class="error" role="alert"></p>

    <main class="layout">
      <aside class="panel cart-panel">
        <a class="cart-link" href="/cart.html" aria-label="Öppna kundvagn">
          <img
            src="https://cdn-icons-png.flaticon.com/512/70/70021.png"
            alt=""
            width="48"
            height="48"
          />
          <span>Kundvagn</span>
        </a>
        <h2 id="itemCounter">Varor i kundvagn: 0</h2>
        <div id="cartSummary" class="summary-lines"></div>
      </aside>

      <section class="panel">
        <h2 class="section-title">Snacks från Firebase</h2>
        <div id="productGrid" class="product-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Byggt av <strong>Elli</strong> &amp; <strong>Dany</strong></p>
      <p>
        <a href="/cart.html">Kundvagn</a> ·
        <a href="https://github.com/Elli2022/nic-cage-snacks-shop">GitHub</a>
      </p>
    </footer>

    <script type="module" src="/src/shop.js"></script>
  </body>
</html>
